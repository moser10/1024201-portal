# Worker 名称必须与 Cloudflare 控制台里实际接域名的 Worker 一致
name = "one-sentence-novel"
main = "worker.js"
compatibility_date = "2024-09-23"
workers_dev = false

# 域名路由须写进本文件，否则 wrangler deploy 会清空控制台里的 Routes（站点 404）
[[routes]]
pattern = "1024201.com/*"
zone_name = "1024201.com"

[[routes]]
pattern = "www.1024201.com/*"
zone_name = "1024201.com"

[[routes]]
pattern = "game.1024201.com/*"
zone_name = "1024201.com"

[assets]
directory = "."
binding = "ASSETS"

# D1：database_id 是绑定关键；database_name 填控制台显示的数据库名
[[d1_databases]]
binding = "DB"
database_name = "one-sentence-novel"
database_id = "1c4cce8e-c510-450d-8277-80b29d415c4b"

# 自定义域名在控制台配置：Workers → one-sentence-novel → Domains & Routes
# RESEND_API_KEY 用 Secret 配置（wrangler secret put），不要写进本文件
# 禁止在本文件添加 [vars] 段——deploy 会同步并清掉控制台里未声明的明文 Variable
# Worker Secret 不会被 wrangler deploy 删除；勿用 deploy 覆盖用户手动配置的密钥
