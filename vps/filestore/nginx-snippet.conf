# Nginx reverse proxy for 1024201 file store (TLS required for Worker → VPS).
# Place under your server block; restrict to Cloudflare or use mTLS if desired.

location /files/ {
    proxy_pass http://127.0.0.1:3921/files/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 6m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

location = /health {
    proxy_pass http://127.0.0.1:3921/health;
}
