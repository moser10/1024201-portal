<!DOCTYPE html>
<html lang="en" class="feature-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5e5ce6">
  <title>Portfolio | 1024201</title>
  <link rel="modulepreload" href="/js/langTabs.js">
  <link rel="stylesheet" href="/js/langTabs.css">
  <link rel="stylesheet" href="/js/featurePage.css">
  <link rel="stylesheet" href="showcase.css">
</head>
<body class="feature-page" data-tool="showcase">
  <div class="feature-shell">
    <div class="feature-main">
      <div class="feature-top">
        <a class="feature-back" id="backLink" href="/tools/">Toolbox</a>
        <div id="langSlot"></div>
      </div>
      <div class="feature-card sc-card">
        <div class="feature-card-head">
          <h1 id="pageTitle">Portfolio</h1>
          <p class="sub" id="pageSub" hidden></p>
          <p class="tool-user" id="userLine" hidden></p>
        </div>

        <div class="sc-workspace" id="scWorkspace">
          <form class="sc-form" id="uploadForm">
            <label class="sc-label" id="lblTitle" for="titleIn">Title</label>
            <input class="sc-input" id="titleIn" type="text" maxlength="120" autocomplete="off" />

            <p class="sc-storage-meta">
              <span class="sc-storage-desc" id="storageDesc"></span>
              <span class="sc-storage-space" id="storageSpace"></span>
            </p>

            <label class="sc-file-drop" id="fileDrop">
              <input type="file" id="fileIn" accept="image/jpeg,image/png,image/webp,image/gif" hidden required />
              <span class="sc-file-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none">
                  <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="8.5" cy="10" r="1.25" fill="currentColor"/>
                  <path d="M3 16l4.5-4.5 3.5 3.5 2.5-2.5L21 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span id="pickLabel">Choose image</span>
              <span class="sc-file-hint" id="pickHint" hidden></span>
            </label>
            <p class="sc-file-name" id="fileName" hidden></p>

            <label class="sc-label" id="lblWatermark" for="wmIn">Watermark text</label>
            <input class="sc-input" id="wmIn" type="text" maxlength="80" placeholder="@yourname" autocomplete="off" />

            <label class="sc-check">
              <input type="checkbox" id="stampChk" />
              <span id="stampLbl"></span>
            </label>
            <p class="sc-hint" id="stampHint"></p>

            <button type="submit" class="btn-primary sc-submit" id="submitBtn">Upload & publish</button>
          </form>

          <div class="sc-mine" id="mineWrap" hidden>
            <h2 class="sc-mine-title" id="mineTitle">My works</h2>
            <ul class="sc-mine-list" id="mineList"></ul>
          </div>

          <div class="sc-published" id="resultBox" hidden></div>

          <div class="login-panel" id="loginPanel" hidden>
            <p id="loginDesc"></p>
            <a class="btn-primary btn-link" id="loginBtn" href="/game/register/">Sign in</a>
          </div>
        </div>
        <div class="sc-progress" id="progressBox" hidden></div>
        <p class="err" id="errBox" hidden></p>
      </div>
    </div>
  </div>
  <script src="/tools/js/instantPaint.js"></script>
  <script type="module" src="showcase.js?v=7"></script>
</body>
</html>
