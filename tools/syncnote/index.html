<!DOCTYPE html>
<html lang="en" class="feature-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#30d158">
  <title>Text Relay | 1024201</title>
  <link rel="modulepreload" href="/js/langTabs.js">
  <link rel="stylesheet" href="/js/langTabs.css">
  <link rel="stylesheet" href="/js/featurePage.css">
  <link rel="stylesheet" href="syncnote.css">
</head>
<body class="feature-page" data-tool="syncnote">
  <div class="feature-shell">
    <div class="feature-main">
    <div class="feature-top">
      <a class="feature-back" id="backLink" href="/tools/">Toolbox</a>
      <div id="langSlot"></div>
    </div>
    <div class="feature-card sync-card">
      <div class="feature-card-head">
        <h1 id="pageTitle">Text Relay</h1>
        <p class="sub" id="pageSub"></p>
        <p class="tool-user" id="userLine" hidden></p>
      </div>

      <div class="sync-workspace" id="syncWorkspace">
        <div id="editorWrap" class="sync-editor">
          <div class="sync-panel">
            <div class="sync-slots" id="slotsWrap">
              <section class="sync-slot" data-slot="0">
                <h2 class="sync-slot-label" data-slot-label="0"></h2>
                <textarea class="sync-input" rows="1" spellcheck="false" autocomplete="off" readonly tabindex="-1"></textarea>
                <p class="sync-status"></p>
                <div class="sync-actions">
                  <button type="button" class="btn-primary sync-copy"></button>
                  <button type="button" class="btn-danger sync-clear"></button>
                </div>
              </section>
              <section class="sync-slot" data-slot="1">
                <h2 class="sync-slot-label" data-slot-label="1"></h2>
                <textarea class="sync-input" rows="1" spellcheck="false" autocomplete="off" readonly tabindex="-1"></textarea>
                <p class="sync-status"></p>
                <div class="sync-actions">
                  <button type="button" class="btn-primary sync-copy"></button>
                  <button type="button" class="btn-danger sync-clear"></button>
                </div>
              </section>
              <section class="sync-slot" data-slot="2">
                <h2 class="sync-slot-label" data-slot-label="2"></h2>
                <textarea class="sync-input" rows="1" spellcheck="false" autocomplete="off" readonly tabindex="-1"></textarea>
                <p class="sync-status"></p>
                <div class="sync-actions">
                  <button type="button" class="btn-primary sync-copy"></button>
                  <button type="button" class="btn-danger sync-clear"></button>
                </div>
              </section>
            </div>
          </div>
        </div>

        <div class="login-panel" id="loginPanel" hidden>
          <p id="loginDesc"></p>
          <a class="btn-primary btn-link" id="loginBtn" href="/game/register/">Sign in</a>
        </div>
      </div>
      <p class="err" id="errBox" hidden></p>
    </div>
    </div>
  </div>
  <script src="/tools/js/instantPaint.js"></script>
  <script type="module" src="syncnote.js?v=4"></script>
</body>
</html>
