<!DOCTYPE html>
<html lang="en" class="feature-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#007aff">
  <title>Find Lyrics | 1024201</title>
  <link rel="stylesheet" href="/js/langTabs.css">
  <link rel="stylesheet" href="/js/featurePage.css">
  <link rel="stylesheet" href="lyrics.css">
</head>
<body class="feature-page">
  <div class="feature-shell">
    <div class="feature-main">
    <div class="feature-top">
      <a class="feature-back" id="backLink" href="/tools/">Toolbox</a>
      <div id="langSlot"></div>
    </div>
    <div class="feature-card lyrics-card">
      <div class="feature-card-head">
        <h1 id="pageTitle">Find Lyrics</h1>
        <p class="sub" id="pageSub">Search by lyrics · artist optional</p>
      </div>

      <div class="pdf-quota" id="quotaBox"></div>

      <div class="unlock-panel lyrics-login" id="loginPanel" hidden>
        <p class="unlock-title" id="loginTitle">Sign in for more</p>
        <p class="unlock-desc" id="loginDesc"></p>
        <a class="btn-primary btn-link" id="loginBtn" href="/game/register/?return=/tools/lyrics/">Sign in</a>
      </div>

      <div class="unlock-panel lyrics-login" id="unlockPanel" hidden>
        <p class="unlock-title" id="unlockTitle">Need more</p>
        <p class="unlock-desc" id="unlockDesc"></p>
        <button type="button" class="btn-secondary" id="adBtn">Watch ad</button>
        <p class="ad-progress" id="adProgress"></p>
      </div>

      <form class="search-form" id="searchForm">
        <label>
          <span id="lblTitle">Lyrics keyword *</span>
          <input type="search" id="qTitle" autocomplete="off">
        </label>
        <label>
          <span id="lblArtist">Artist</span>
          <input type="search" id="qArtist" autocomplete="off">
        </label>
        <p class="hint" id="searchHint"></p>
        <button type="submit" class="btn-primary" id="searchBtn">Search</button>
      </form>

      <p class="err" id="errBox" hidden></p>

      <div id="searchLoading" class="loading-panel" hidden></div>

      <div class="results-wrap" id="resultsWrap" hidden>
        <table class="results-table">
          <thead>
            <tr>
              <th id="thTitle">Title</th>
              <th id="thArtist">Artist</th>
              <th id="thAlbum">Album</th>
              <th id="thYear">Year</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
    </div>
  </div>
  <script type="module" src="lyrics.js?v=6"></script>
</body>
</html>
